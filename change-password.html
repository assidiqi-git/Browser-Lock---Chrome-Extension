<!doctype html>
<html>
  <head>
    <title>Change Password</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #ffffff;
        margin: 0;
        width: 320px;
      }
      .container {
        padding: 20px;
        width: 100%;
        box-sizing: border-box;
      }
      h2 {
        margin-top: 0;
        color: #333;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        color: #666;
      }
      input[type="password"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
        outline: none;
      }
      input[type="password"]:focus {
        border-color: #28a745;
        box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #218838;
      }
      #status {
        margin-top: 15px;
        font-size: 14px;
        text-align: center;
      }
      .success {
        color: #28a745;
      }
      .error {
        color: #dc3545;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="options.html" style="text-decoration: none; color: #007bff; display: inline-block; margin-bottom: 15px;">&larr; Back to Options</a>
      <h2>Change Password</h2>
      <div class="form-group">
        <label for="current-password">Current Password</label>
        <input type="password" id="current-password" />
      </div>
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" />
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm New Password</label>
        <input type="password" id="confirm-password" />
      </div>
      <button id="save-btn">Update Password</button>
      <div id="status"></div>
    </div>
    <script src="change-password.js"></script>
  </body>
</html>
